<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโหวตปก Portfolio ม.6 - ครูวีณา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        
        <div class="bg-amber-500 text-white text-center py-2.5 px-4 text-xs font-bold flex justify-between items-center shadow-inner">
            <span>สำหรับผู้ดูแลระบบ:</span>
            <button onclick="openAdminModal()" class="bg-white text-amber-700 px-3 py-1 rounded-lg font-bold hover:bg-amber-50 transition-all shadow-sm flex items-center gap-1 animate-pulse">
                🔑 เข้าหน้า Admin (ครูวีณา)
            </button>
        </div>
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white text-center">
            <span class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider">Activity</span>
            <h1 class="text-2xl font-bold mt-2">🗳️ โหวตปก Portfolio ม.6</h1>
            <p class="text-blue-100 text-xs mt-1">ห้อง ม.6/12 - ม.6/18 | คุณครูวีณา</p>
        </div>

        <div class="p-6">
            
            <div id="page-1" class="space-y-4">
                <label class="block text-slate-700 font-semibold text-center text-base mb-2">กรุณาเลือกห้องเรียนของคุณเพื่อโหวต</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="goToPage2('12')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/12</button>
                    <button onclick="goToPage2('13')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/13</button>
                    <button onclick="goToPage2('14')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/14</button>
                    <button onclick="goToPage2('15')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/15</button>
                    <button onclick="goToPage2('16')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/16</button>
                    <button onclick="goToPage2('17')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all text-center">ม.6/17</button>
                    <button onclick="goToPage2('18')" class="p-4 bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold rounded-2xl border border-slate-200 hover:border-blue-300 transition-all col-span-2 text-center">ม.6/18</button>
                </div>
                
                <div class="pt-2 space-y-2">
                    <button onclick="goToSummaryPage()" class="w-full py-3.5 bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold rounded-2xl border border-amber-200 transition-all text-center text-sm flex items-center justify-center gap-2 shadow-sm">
                        🏆 ดูสรุปคะแนนสูงสุด เรียงตามห้อง
                    </button>
                    <button onclick="goToAllResultsPage()" class="w-full py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-semibold rounded-xl border border-indigo-100 transition-all text-center text-xs flex items-center justify-center gap-2">
                        📋 ดูประวัติการโหวตละเอียด (ใครโหวตใครบ้าง)
                    </button>
                </div>
            </div>

            <div id="page-2" class="hidden space-y-5">
                <div class="flex justify-between items-center bg-blue-50/70 px-4 py-3 rounded-2xl border border-blue-100">
                    <span class="text-blue-700 font-bold text-sm">📍 กำลังโหวตให้ห้อง: ม.6/<span id="selected-room"></span></span>
                    <button onclick="goToPage1()" class="text-xs text-slate-400 hover:text-blue-600 transition-colors">เปลี่ยนห้อง</button>
                </div>

                <div class="space-y-1">
                    <label class="block text-slate-700 text-sm font-semibold">1. เลขที่ของคุณ (ผู้โหวต)</label>
                    <input type="number" id="voter-no" min="1" max="50" placeholder="ระบุเลขที่ของคุณ เช่น 5" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all text-sm">
                    <p class="text-[11px] text-slate-400 pt-0.5">* ข้อมูลนี้จะถูกเก็บเพื่อป้องกันการโหวตซ้ำในระบบ</p>
                </div>

                <div class="space-y-1">
                    <label class="block text-slate-700 text-sm font-semibold">2. เลขที่ของเพื่อนที่คุณต้องการโหวตให้</label>
                    <input type="number" id="candidate-no" min="1" max="50" placeholder="ระบุเลขที่ของเพื่อน เช่น 21" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:outline-none transition-all text-sm">
                </div>

                <button onclick="submitVote()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-100 active:scale-[0.99]">
                    ส่งผลโหวต & ดูคะแนนสรุป 🚀
                </button>
            </div>

            <div id="page-3" class="hidden space-y-5">
                <div class="text-center">
                    <h3 class="text-lg font-bold text-slate-800">📊 ผลโหวตปัจจุบัน ม.6/<span id="result-room"></span></h3>
                    <p class="text-xs text-slate-400 mt-0.5">คะแนนอัปเดตเรียลไทม์จากระบบ</p>
                </div>

                <div id="leaderboard-container" class="space-y-3 max-h-[280px] overflow-y-auto pr-1"></div>

                <div class="pt-2 border-t border-slate-100 flex gap-2">
                    <button onclick="goToPage1()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl text-xs transition-all text-center">
                        ↩️ กลับหน้าแรก
                    </button>
                    <button onclick="renderLeaderboard()" class="w-1/2 py-3 bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold rounded-xl text-xs transition-all text-center">
                        🔄 อัปเดตคะแนนสด
                    </button>
                </div>
            </div>

            <div id="page-4" class="hidden space-y-4">
                <div class="text-center">
                    <h3 class="text-lg font-bold text-slate-800">📋 ประวัติการโหวตละเอียด ทุกห้อง</h3>
                    <p class="text-xs text-slate-400 mt-0.5">แสดงข้อมูลโปร่งใสว่าใครโหวตให้ใครบ้าง</p>
                </div>

                <div id="all-results-container" class="space-y-4 max-h-[320px] overflow-y-auto pr-1 text-sm text-slate-700"></div>

                <div class="pt-2 border-t border-slate-1
